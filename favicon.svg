<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Dark Circle Background for High Contrast -->
    <circle cx="50" cy="50" r="48" fill="#111111" stroke="#333333" stroke-width="1"/>
    
    <!-- Geometric 'S' - Interlocking Vectors representing Engineering/Security -->
    <path d="M25 35 L50 20 L75 35 L60 45 L50 38 L40 45 Z M75 65 L50 80 L25 65 L40 55 L50 62 L60 55 Z" 
          fill="#FFFFFF" 
          stroke="#FFFFFF" 
          stroke-width="1.5" 
          stroke-linejoin="bevel"/>
    
    <!-- Subtle Inner Connectivity Lines -->
    <line x1="50" y1="38" x2="50" y2="62" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.5"/>
</svg>
